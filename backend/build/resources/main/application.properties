# ============================================================
# ? ReserveCamping - Configuration MySQL
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/reservecamping?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=eric

# Driver et dialecte MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuration Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Serveur web
server.port=8080

# ============================================================
# ? Fichiers statiques / uploads
# ============================================================
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/**